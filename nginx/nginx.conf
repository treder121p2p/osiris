worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Define a cache zone named 'tile_cache', with a 100MB RAM index, and 10GB max disk size.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tile_cache:100m max_size=10g inactive=365d use_temp_path=off;

    # DNS resolver required to resolve upstream domain names
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # Protected endpoint (main user entry)
    server {
        listen 8080;

        auth_basic "OSIRIS Protected";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Route 1: Proxy map tiles from CARTO
        location ~ ^/proxy/tiles/(?<target_domain>(?:[a-d]\.)?basemaps\.cartocdn\.com)/(?<target_path>.*)$ {
            proxy_pass https://$target_domain/$target_path$is_args$args;
            proxy_set_header Host $target_domain;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_hide_header Set-Cookie;
            proxy_ignore_headers Set-Cookie;
            proxy_cache tile_cache;
            proxy_cache_valid 200 304 365d;
            proxy_cache_valid any 1m;
            proxy_cache_lock on;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
        }

        location ~ ^/proxy/tiles/ {
            return 403;
        }

        location / {
            proxy_pass http://osiris:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Emergency local bypass endpoint for rollback checks (loopback-only via compose port binding)
    server {
        listen 8081;

        location ~ ^/proxy/tiles/(?<target_domain>(?:[a-d]\.)?basemaps\.cartocdn\.com)/(?<target_path>.*)$ {
            proxy_pass https://$target_domain/$target_path$is_args$args;
            proxy_set_header Host $target_domain;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_hide_header Set-Cookie;
            proxy_ignore_headers Set-Cookie;
            proxy_cache tile_cache;
            proxy_cache_valid 200 304 365d;
            proxy_cache_valid any 1m;
            proxy_cache_lock on;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
        }

        location ~ ^/proxy/tiles/ {
            return 403;
        }

        location / {
            proxy_pass http://osiris:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
